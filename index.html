<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator Application</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <!-- Flex div containing all the inner fields - display one line + all other buttons
     * Div calculator should have class .calculator
     * Display should have it's own id #display
     * Each button should have it's own id
     * This should make everything easy to fetch content through JS
     

     Functionalities
     * Maybe I can add the value's of buttons in the calculator object
     * Then consider if methods could be added to the calculator object
      to make it easier to navigate with value
     -->


    
    <div class="calculator">
        <div id="display"></div>
        
        <div id="clear">CE</div>

        <div id="seven">7</div>
        <div id="eight">8</div>
        <div id="nine">9</div>
        <div id="divider">/</div>

        <div id="four">4</div>
        <div id="five">5</div>
        <div id="six">6</div>
        <div id="multiply">*</div>

        <div id="one">1</div>
        <div id="two">2</div>
        <div id="three">3</div>
        <div id="minus">-</div>

        <div id="zero">0</div>
        <div id="equal">=</div>
        <div id="plus">+</div>
    </div>
    
</body>
</html>
